<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe 3D WAN</title>


    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>


<body>


<div class="container">


    <header>

        <h1>Tic Tac Toe 3D</h1>

        <p>Quantum Multiplayer Arena</p>

    </header>




    <section class="hud">


        <div class="panel">

            <span>Servidor</span>

            <strong id="estado">
                Esperando jugadores
            </strong>

        </div>



        <div class="panel">

            <span>Jugadores</span>

            <strong id="jugadores">
                0 / 2
            </strong>

        </div>



        <div class="panel turno-panel">

            <span>Turno actual</span>

            <strong id="turno">
                Esperando
            </strong>

        </div>



        <div class="panel">

            <span>Última jugada</span>

            <strong id="coordenadas">
                X=-
                Y=-
                Z=-
            </strong>

        </div>



    </section>





    <section class="game-area">


        <div id="tablero">

        </div>


    </section>





    <section class="message-area">


        <div id="mensaje-final">

        </div>


    </section>






    <section class="controls">


        <button 
        class="btn primary"
        onclick="reiniciar()">

            Nueva partida

        </button>



        <button 
        class="btn secondary"
        onclick="salir()">

            Salir

        </button>



    </section>



</div>





<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


<script src="{{ url_for('static', filename='game.js') }}"></script>



</body>

</html>
